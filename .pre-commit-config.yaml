repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.5
  hooks:
    - id: ruff-format
      name: Ruff format
      files: "^server/"

    - id: ruff-check
      name: Ruff lint
      args: [ --fix ]
      files: "^server/"

- repo: https://github.com/ComPWA/taplo-pre-commit
  rev: v0.9.3
  hooks:
    - id: taplo-format
      name: Taplo format (TOML)

- repo: local
  hooks:
  - id: prettier
    name: Prettier
    language: node
    files: "^client/src/"
    entry: prettier --write
